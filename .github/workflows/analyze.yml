name: Analyze

permissions:
  contents: read
  security-events: write

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel previous runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze

    strategy:
      matrix:
        runner: [ubuntu-26.04]
        compiler: [GCC]
        configuration: [Coverage]

    runs-on: ${{ matrix.runner }}

    env:
      CODECOV_REPORT: cxx_coverage_codecov.xml
      SONAR_REPORT: cxx_coverage_sonar.xml
      JS_REPORT_PATH: source/titgui/coverage/lcov.info

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fetch all history for proper analysis and coverage reports.
          fetch-depth: 0

      - name: Setup runner
        uses: ./.github/actions/setup_runner
        with:
          compiler: ${{ matrix.compiler }}

      - name: Setup vcpkg
        uses: ./.github/actions/setup_vcpkg

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          config-file: .github/codeql/codeql-config.yml

      - name: Build and test
        run: |
          ./build/build.sh --config ${{ matrix.configuration }} --test

      - name: Upload test output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-output-${{ matrix.runner }}-${{ matrix.compiler }}-${{ matrix.configuration }}
          path: output/test_output

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          slug: Jhuighuy/TitSolver
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.CODECOV_REPORT }},${{ env.JS_REPORT_PATH }}
          disable_search: true

      - name: Run Sonar Scanner
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define "sonar.cfamily.experimental.cpp26.enabled=true"
            --define "sonar.cfamily.compile-commands=./output/cmake_output/${{ matrix.configuration }}/compile_commands.json"
            --define "sonar.coverageReportPaths=${{ env.SONAR_REPORT }}"
            --define "sonar.javascript.lcov.reportPaths=${{ env.JS_REPORT_PATH }}"

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v4
